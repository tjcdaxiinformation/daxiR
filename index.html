<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大溪宗教教育團體即時計分板</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        .bar-transition { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .question-overlay { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 圖示組件
        const Icon = ({ name, className }) => {
            const icons = {
                trophy: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
                users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
                save: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                refresh: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
                plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                minus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                grid: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
                list: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
                chart: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
                camera: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
                book: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
                x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            };
            return icons[name] || null;
        };

        const STAGE_NAMES = ['第一關', '第二關', '第三關', '第四關', '第五關', '第六關'];
        const QUESTIONS = [
            { q: "最喜歡的速食店？", options: "麥當勞 / 肯德基" },
            { q: "最怕的學科？", options: "數學 / 英文" },
            { q: "放假最想去的地方？", options: "山上 / 海邊" },
            { q: "最喜歡的飲料？", options: "珍珠奶茶 / 水果茶" },
            { q: "覺得聖經裡哪個角色更酷？", options: "大衛 / 摩西" },
            { q: "早餐習慣吃什麼？", options: "漢堡 / 蛋餅" },
            { q: "遇到困難時的第一反應？", options: "先禱告 / 先找朋友" },
            { q: "最喜歡的季節？", options: "夏天 / 冬天" },
            { q: "看電影喜歡坐？", options: "前面 / 後面" },
            { q: "睡覺前會做的事？", options: "滑手機 / 讀經禱告" },
            { q: "最喜歡的水果？", options: "西瓜 / 草莓" },
            { q: "運動時喜歡？", options: "打球 / 跑步" },
            { q: "出門必帶的東西？", options: "錢包 / 手機" },
            { q: "喜歡的寵物？", options: "貓派 / 狗派" }
        ];

        const initialGroups = [
            { id: '1', name: '第一組', scores: [5, 5, 5, 0, 0, 0], total: 15, avatar: null },
            { id: '2', name: '第二組', scores: [2, 5, 5, 0, 0, 0], total: 12, avatar: null },
            { id: '3', name: '第三組', scores: [2, 2, 2, 0, 0, 0], total: 6, avatar: null },
            { id: '4', name: '第四組', scores: [2, 0, 0, 2, 0, 0], total: 4, avatar: null },
        ];

        function App() {
            const [groups, setGroups] = useState(initialGroups);
            const [editMode, setEditMode] = useState(false);
            const [viewMode, setViewMode] = useState('grid');
            const [showQA, setShowQA] = useState(false);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const fileInputRef = useRef(null);
            const [activeGroupId, setActiveGroupId] = useState(null);

            const updateName = (groupId, newName) => {
                setGroups(groups.map(g => g.id === groupId ? { ...g, name: newName } : g));
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (file && activeGroupId) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setGroups(groups.map(g => g.id === activeGroupId ? { ...g, avatar: reader.result } : g));
                        setActiveGroupId(null);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const triggerUpload = (groupId) => {
                if (!editMode) return;
                setActiveGroupId(groupId);
                fileInputRef.current.click();
            };

            const updateScore = (groupId, stageIndex, delta) => {
                setGroups(groups.map(group => {
                    if (group.id === groupId) {
                        const newScores = [...group.scores];
                        newScores[stageIndex] = Math.max(0, newScores[stageIndex] + delta);
                        return { ...group, scores: newScores, total: newScores.reduce((a, b) => a + b, 0) };
                    }
                    return group;
                }));
            };

            const nextQuestion = () => {
                setCurrentQIndex((prev) => (prev + 1) % QUESTIONS.length);
            };

            const rankedGroups = useMemo(() => [...groups].sort((a, b) => b.total - a.total), [groups]);
            const maxScore = useMemo(() => Math.max(...groups.map(g => g.total), 10), [groups]);

            return (
                <div className="min-h-screen bg-slate-950 text-white p-4 md:p-8 flex flex-col relative overflow-hidden">
                    <input type="file" ref={fileInputRef} onChange={handleAvatarUpload} accept="image/*" className="hidden" />

                    {/* 默契大考驗題庫彈窗 */}
                    {showQA && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 question-overlay bg-slate-950/80">
                            <div className="w-full max-w-4xl bg-gradient-to-br from-slate-900 to-slate-800 border-2 border-yellow-500/50 rounded-[3rem] p-12 shadow-[0_0_100px_rgba(234,179,8,0.2)] relative">
                                <button onClick={() => setShowQA(false)} className="absolute top-8 right-8 p-4 bg-slate-800 rounded-full hover:bg-slate-700 transition-colors">
                                    <Icon name="x" className="w-8 h-8 text-slate-400" />
                                </button>
                                
                                <div className="text-center space-y-12">
                                    <div className="inline-block px-8 py-2 bg-yellow-500/10 border border-yellow-500/30 rounded-full text-yellow-500 font-black tracking-[0.5em] uppercase text-xl">
                                        默契大考驗
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <h2 className="text-6xl md:text-8xl font-black leading-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-400">
                                            {QUESTIONS[currentQIndex].q}
                                        </h2>
                                        <p className="text-3xl md:text-4xl text-blue-400 font-bold tracking-widest opacity-80">
                                            {QUESTIONS[currentQIndex].options}
                                        </p>
                                    </div>

                                    <div className="flex flex-col items-center gap-6 pt-8">
                                        <button onClick={nextQuestion} className="px-12 py-6 bg-yellow-500 hover:bg-yellow-400 text-slate-950 rounded-2xl text-3xl font-black transition-all transform hover:scale-105 active:scale-95 shadow-[0_20px_40px_rgba(234,179,8,0.3)]">
                                            下一個題目
                                        </button>
                                        <p className="text-slate-500 text-xl font-bold">預備... 三、二、一！</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-800 pb-6 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-yellow-500 p-3 rounded-2xl shadow-[0_0_20px_rgba(234,179,8,0.3)]">
                                <Icon name="trophy" className="w-8 h-8 text-slate-950" />
                            </div>
                            <div>
                                <h1 className="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                                    大溪宗教教育團體共習活動
                                </h1>
                                <div className="flex gap-4 mt-1 items-center">
                                    <p className="text-slate-400 font-medium flex items-center gap-2">
                                        <span className="inline-block w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                        即時電子計分板
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2 w-full md:w-auto">
                            <button 
                                onClick={() => setShowQA(true)} 
                                className="flex items-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all shadow-[0_0_20px_rgba(37,99,235,0.3)]"
                            >
                                <Icon name="book" className="w-5 h-5" />
                                <span>默契題庫</span>
                            </button>

                            <div className="bg-slate-900 p-1 rounded-xl flex border border-slate-800">
                                <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg transition-all ${viewMode === 'grid' ? 'bg-slate-700 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}><Icon name="grid" className="w-5 h-5" /></button>
                                <button onClick={() => setViewMode('list')} className={`p-2 rounded-lg transition-all ${viewMode === 'list' ? 'bg-slate-700 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}><Icon name="list" className="w-5 h-5" /></button>
                                <button onClick={() => setViewMode('chart')} className={`p-2 rounded-lg transition-all ${viewMode === 'chart' ? 'bg-slate-700 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}><Icon name="chart" className="w-5 h-5" /></button>
                            </div>
                            
                            <button onClick={() => setEditMode(!editMode)} className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold transition-all ${editMode ? 'bg-green-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}>
                                <Icon name={editMode ? 'save' : 'edit'} className="w-5 h-5" />
                                <span className="hidden sm:inline">{editMode ? '完成' : '後台'}</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                        {viewMode === 'chart' ? (
                            <div className="bg-slate-900/50 border border-slate-800 rounded-[2rem] p-8 space-y-10">
                                {rankedGroups.map((group, index) => (
                                    <div key={group.id} className="relative">
                                        <div className="flex justify-between items-end mb-3">
                                            <div className="flex items-center gap-4">
                                                <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold ${index === 0 ? 'bg-yellow-500 text-slate-950' : 'bg-slate-800 text-slate-400'}`}>{index + 1}</span>
                                                <div className="w-10 h-10 rounded-lg bg-slate-800 overflow-hidden shrink-0 border border-slate-700">
                                                    {group.avatar ? <img src={group.avatar} className="w-full h-full object-cover" /> : <Icon name="users" className="w-full h-full p-2 text-slate-600" />}
                                                </div>
                                                <span className="text-2xl font-bold">{group.name}</span>
                                            </div>
                                            <span className={`text-3xl font-black ${index === 0 ? 'text-yellow-500' : 'text-white'}`}>{group.total} <span className="text-sm font-normal opacity-50">PTS</span></span>
                                        </div>
                                        <div className="h-6 w-full bg-slate-800 rounded-full overflow-hidden shadow-inner">
                                            <div className={`h-full bar-transition rounded-full ${index === 0 ? 'bg-gradient-to-r from-yellow-600 to-yellow-400' : index === 1 ? 'bg-gradient-to-r from-slate-500 to-slate-300' : 'bg-gradient-to-r from-blue-600 to-blue-400'}`} style={{ width: `${(group.total / maxScore) * 100}%` }} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className={viewMode === 'grid' ? "grid grid-cols-1 lg:grid-cols-2 gap-6" : "flex flex-col gap-4"}>
                                {rankedGroups.map((group, index) => (
                                    <div key={group.id} className={`relative rounded-[2.5rem] p-8 transition-all duration-500 ${index === 0 ? 'bg-gradient-to-br from-slate-800 to-slate-900 border-2 border-yellow-500/40 shadow-[0_0_40px_rgba(234,179,8,0.1)]' : 'bg-slate-900 border-2 border-slate-800'}`}>
                                        <div className={`absolute top-0 left-0 w-14 h-14 flex items-center justify-center font-black text-xl rounded-br-2xl shadow-lg ${index === 0 ? 'bg-yellow-500 text-slate-950' : index === 1 ? 'bg-slate-300 text-slate-900' : 'bg-slate-700 text-slate-400'}`}>{index + 1}</div>
                                        <div className="flex flex-col sm:flex-row items-center gap-6 mb-8 mt-4">
                                            <div onClick={() => triggerUpload(group.id)} className={`w-24 h-24 rounded-3xl flex items-center justify-center shrink-0 overflow-hidden border-2 transition-all ${editMode ? 'cursor-pointer border-yellow-500 hover:scale-105' : (index === 0 ? 'border-yellow-500/50' : 'border-slate-700')}`}>
                                                {group.avatar ? <img src={group.avatar} className="w-full h-full object-cover" /> : <Icon name="users" className={`w-12 h-12 ${index === 0 ? 'text-yellow-500' : 'text-slate-500'}`} />}
                                            </div>
                                            <div className="flex-1 text-center sm:text-left min-w-0">
                                                {editMode ? (
                                                    <input type="text" value={group.name} onChange={(e) => updateName(group.id, e.target.value)} className="bg-slate-800/50 border-b-2 border-yellow-500 outline-none text-4xl font-black w-full py-1 text-yellow-400" />
                                                ) : (
                                                    <h2 className="text-5xl font-black truncate">{group.name}</h2>
                                                )}
                                                <div className="flex gap-2 mt-4 justify-center sm:justify-start">
                                                    {STAGE_NAMES.map((_, i) => <div key={i} className={`w-3 h-3 rounded-full transition-all duration-500 ${group.scores[i] > 0 ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.6)]' : 'bg-slate-800'}`}></div>)}
                                                </div>
                                            </div>
                                            <div className="text-center sm:text-right shrink-0">
                                                <div className="text-slate-500 text-xs font-black uppercase tracking-widest mb-1">Total Score</div>
                                                <div className={`text-8xl font-black tracking-tighter tabular-nums ${index === 0 ? 'text-yellow-500' : 'text-white'}`}>{group.total}</div>
                                            </div>
                                        </div>
                                        {viewMode === 'grid' && (
                                            <div className="grid grid-cols-3 md:grid-cols-6 gap-3">
                                                {STAGE_NAMES.map((name, sIdx) => (
                                                    <div key={sIdx} className="bg-slate-950/40 rounded-2xl p-4 text-center border border-slate-800">
                                                        <div className="text-[10px] text-slate-500 mb-2 font-black uppercase tracking-tighter">{name}</div>
                                                        <div className="flex items-center justify-center gap-1">
                                                            {editMode ? (
                                                                <div className="flex items-center gap-1">
                                                                    <button onClick={() => updateScore(group.id, sIdx, -1)} className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center hover:bg-red-500 transition-colors"><Icon name="minus" className="w-4 h-4" /></button>
                                                                    <span className="text-2xl font-black w-8">{group.scores[sIdx]}</span>
                                                                    <button onClick={() => updateScore(group.id, sIdx, 1)} className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center hover:bg-green-500 transition-colors"><Icon name="plus" className="w-4 h-4" /></button>
                                                                </div>
                                                            ) : (
                                                                <span className={`text-4xl font-black ${group.scores[sIdx] > 0 ? 'text-blue-400' : 'text-slate-800'}`}>{group.scores[sIdx]}</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="mt-8 pt-6 border-t border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4 text-slate-500 text-sm font-bold">
                        <div className="flex gap-8">
                            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div><span>當前領先</span></div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div><span>已達成關卡</span></div>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="bg-slate-900 border border-slate-800 px-4 py-1 rounded-full text-xs uppercase tracking-widest">在大螢幕呈現最佳效果</span>
                            <div className="font-mono bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 shadow-xl text-slate-400">
                                更新：{new Date().toLocaleTimeString()}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
